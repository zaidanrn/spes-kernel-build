name: Build Kernel - Spes Gaming KSU Next

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:

      - name: Setup Build Environment
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            git curl wget zip unzip \
            bc bison flex libssl-dev \
            libelf-dev libncurses5-dev \
            binutils-aarch64-linux-gnu \
            gcc-aarch64-linux-gnu \
            python3 python3-pip \
            build-essential cpio make

      - name: Setup Clang Toolchain
        run: |
          mkdir -p $HOME/clang
          wget -q https://github.com/ZyCromerZ/Clang/releases/download/20.0.0git-20250101-release/Clang-20.0.0git-20250101.tar.gz -O clang.tar.gz
          tar -xf clang.tar.gz -C $HOME/clang
          echo "$HOME/clang/bin" >> $GITHUB_PATH

      - name: Clone Kernel Source
        run: |
          git clone --depth=1 \
            -b spes-r-oss \
            https://github.com/mi-sdm680/android_kernel_xiaomi_sm6225 \
            kernel_source
          echo "=== List defconfigs ==="
          ls kernel_source/arch/arm64/configs/ | grep -i spes || ls kernel_source/arch/arm64/configs/

      - name: Setup KernelSU Next
        run: |
          cd kernel_source
          curl -LSs "https://raw.githubusercontent.com/rifsxd/KernelSU-Next/next/kernel/setup.sh" | bash -s next
          echo "KernelSU Next done!"

      - name: Build Kernel
        run: |
          cd kernel_source
          export ARCH=arm64
          export PATH=$HOME/clang/bin:$PATH
          export CROSS_COMPILE=aarch64-linux-gnu-
          export CC=clang
          export LLVM=1
          export LLVM_IAS=1

          # Cari defconfig otomatis
          DEFCONFIG=$(ls arch/arm64/configs/ | grep -i spes | head -1)
          if [ -z "$DEFCONFIG" ]; then
            DEFCONFIG=$(ls arch/arm64/configs/ | grep -i vendor | head -1)
          fi
          echo "=== Using defconfig: $DEFCONFIG ==="

          # Tambah gaming tweaks
          cat >> arch/arm64/configs/$DEFCONFIG << 'EOF'
# Gaming tweaks
CONFIG_HZ=300
CONFIG_CPU_FREQ_GOV_SCHEDUTIL=y
CONFIG_CPU_FREQ_DEFAULT_GOV_SCHEDUTIL=y
CONFIG_IOSCHED_BFQ=y
CONFIG_BFQ_GROUP_IOSCHED=y
CONFIG_DEFAULT_BFQ=y
CONFIG_TCP_CONG_BBR=y
CONFIG_DEFAULT_BBR=y
CONFIG_NET_SCH_FQ=y
CONFIG_ZRAM=y
CONFIG_ZSMALLOC=y
CONFIG_DEBUG_KERNEL=n
CONFIG_SLUB_DEBUG=n
CONFIG_DEBUG_PREEMPT=n
EOF

          make O=out ARCH=arm64 CC=clang LLVM=1 LLVM_IAS=1 \
            CROSS_COMPILE=aarch64-linux-gnu- \
            $DEFCONFIG

          make -j$(nproc --all) O=out ARCH=arm64 CC=clang LLVM=1 LLVM_IAS=1 \
            CROSS_COMPILE=aarch64-linux-gnu- \
            2>&1 | tee build.log

      - name: Check Build Result
        run: |
          if [ -f kernel_source/out/arch/arm64/boot/Image.gz ]; then
            echo "SUCCESS!"
          elif [ -f kernel_source/out/arch/arm64/boot/Image ]; then
            cp kernel_source/out/arch/arm64/boot/Image kernel_source/out/arch/arm64/boot/Image.gz
            echo "SUCCESS! (Image)"
          else
            echo "FAILED!"
            tail -100 kernel_source/build.log
            exit 1
          fi

      - name: Package AnyKernel3
        run: |
          git clone --depth=1 https://github.com/osm0sis/AnyKernel3 AnyKernel3
          cp kernel_source/out/arch/arm64/boot/Image.gz AnyKernel3/
          cp kernel_source/out/arch/arm64/boot/dtbo.img AnyKernel3/ 2>/dev/null || true

          cat > AnyKernel3/anykernel.sh << 'EOF'
properties() { '
kernel.string=GamingKernel-KSUNext | spes | Gaming Build
do.devicecheck=1
do.modules=0
do.systemless=0
do.cleanup=1
do.cleanuponabort=0
device.name1=spes
device.name2=spesn
supported.versions=13
'; }
boot_attributes() {
    set_perm_recursive 0 0 755 644 $RAMDISK/*;
    set_perm_recursive 0 0 750 750 $RAMDISK/init* $RAMDISK/sbin;
}
BLOCK=auto;
IS_SLOT_DEVICE=0;
RAMDISK_COMPRESSION=auto;
PATCH_VBMETA_FLAG=auto;
. tools/ak3-core.sh;
ui_print "=====================================";
ui_print " Gaming Kernel - KSU Next            ";
ui_print " Redmi Note 11 4G (spes) - Android13 ";
ui_print "=====================================";
dump_boot;
write_boot;
EOF

          DATE=$(date +%Y%m%d-%H%M)
          cd AnyKernel3
          zip -r9 "../GamingKernel-KSUNext-spes-${DATE}.zip" . -x ".git*"

      - name: Upload Kernel ZIP
        uses: actions/upload-artifact@v4
        with:
          name: GamingKernel-KSUNext-spes
          path: GamingKernel-KSUNext-spes-*.zip
          retention-days: 7

      - name: Upload Build Log if Failed
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: kernel_source/build.log
          retention-days: 3
          
