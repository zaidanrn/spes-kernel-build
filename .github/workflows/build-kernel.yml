name: GACOR Kernel for Redmi Note 11 (spes) - No OC

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
    - name: Install tools
      run: |
        sudo apt update
        sudo apt install -y git make gcc clang lld flex bison bc cpio python3 libssl-dev

    - name: Download toolchain
      run: |
        git clone --depth=1 https://github.com/LineageOS/android_prebuilts_clang_host_linux-x86_clang-17 clang
        git clone --depth=1 https://github.com/LineageOS/android_prebuilts_gcc_linux-x86_aarch64_aarch64-linux-android-4.9 gcc64
        git clone --depth=1 https://github.com/LineageOS/android_prebuilts_gcc_linux-x86_arm_arm-linux-androideabi-4.9 gcc32

    - name: Clone kernel source
      run: |
        git clone --depth=1 https://github.com/Jabiyeff/kernel_xiaomi_sm6225 -b main kernel

    - name: Patch KernelSU-Next
      run: |
        cd kernel
        curl -LSs "https://raw.githubusercontent.com/KernelSU-Next/KernelSU-Next/next/kernel/setup.sh" | bash -

    - name: Tuning GACOR (No OC)
      run: |
        cd kernel
        
        # Load defconfig
        make ARCH=arm64 spes_defconfig
        
        # ============================================
        # OPTIMASI GAMING (NO OVERCLOCK)
        # ============================================
        
        # Aktifin TCP BBR - buat koneksi stabil & kenceng
        echo "CONFIG_TCP_CONG_BBR=y" >> arch/arm64/configs/spes_defconfig
        echo "CONFIG_DEFAULT_TCP_CONG=\"bbr\"" >> arch/arm64/configs/spes_defconfig
        
        # Aktifin Westwood + Cubic cadangan
        echo "CONFIG_TCP_CONG_WESTWOOD=y" >> arch/arm64/configs/spes_defconfig
        echo "CONFIG_TCP_CONG_CUBIC=y" >> arch/arm64/configs/spes_defconfig
        
        # Aktifin HZ 1000 buat respons lebih cepat (standar 300)
        echo "CONFIG_HZ=1000" >> arch/arm64/configs/spes_defconfig
        echo "CONFIG_HZ_1000=y" >> arch/arm64/configs/spes_defconfig
        
        # Governor schedutil + performa buat gaming
        echo "CONFIG_CPU_FREQ_GOV_SCHEDUTIL=y" >> arch/arm64/configs/spes_defconfig
        echo "CONFIG_CPU_FREQ_GOV_PERFORMANCE=y" >> arch/arm64/configs/spes_defconfig
        
        # Aktifin quick wakeup buat touch respons lebih cepet
        echo "CONFIG_PM_WAKELOCKS=y" >> arch/arm64/configs/spes_defconfig
        echo "CONFIG_PM_WAKELOCKS_LIMIT=100" >> arch/arm64/configs/spes_defconfig
        
        # Matiin debug & logging (bikin kernel enteng)
        echo "# CONFIG_DEBUG_KERNEL is not set" >> arch/arm64/configs/spes_defconfig
        echo "# CONFIG_DEBUG_INFO is not set" >> arch/arm64/configs/spes_defconfig
        echo "# CONFIG_PRINTK is not set" >> arch/arm64/configs/spes_defconfig
        
        # Aktifin UKSM buat manajemen memori lebih efisien
        echo "CONFIG_UKSM=y" >> arch/arm64/configs/spes_defconfig
        
        # Aktifin ZRAM buat multitasking gaming
        echo "CONFIG_ZRAM=y" >> arch/arm64/configs/spes_defconfig
        echo "CONFIG_ZRAM_DEF_COMPRESSOR_LZ4=y" >> arch/arm64/configs/spes_defconfig
        
        # Aktifin TCP Fast Open buat koneksi cepet
        echo "CONFIG_TCP_FASTOPEN=y" >> arch/arm64/configs/spes_defconfig
        
        # Aktifin NF Contrack buat koneksi stabil
        echo "CONFIG_NF_CONNTRACK=y" >> arch/arm64/configs/spes_defconfig
        
        # Aktifin VirtIO WiFi buat sinyal lebih stabil
        echo "CONFIG_VIRTIO_NET=y" >> arch/arm64/configs/spes_defconfig
        
        # Optimasi I/O scheduler (pake BFQ atau MQ-Deadline)
        echo "CONFIG_BFQ_GROUP_IOSCHED=y" >> arch/arm64/configs/spes_defconfig
        echo "CONFIG_DEFAULT_BFQ=y" >> arch/arm64/configs/spes_defconfig
        
        # Aktifin KSM buat sharing memory (hemat RAM)
        echo "CONFIG_KSM=y" >> arch/arm64/configs/spes_defconfig
        
        # Re-generate config
        make ARCH=arm64 olddefconfig

    - name: Build kernel GACOR
      run: |
        cd kernel
        export PATH=$GITHUB_WORKSPACE/clang/bin:$GITHUB_WORKSPACE/gcc64/bin:$GITHUB_WORKSPACE/gcc32/bin:$PATH
        export ARCH=arm64
        export SUBARCH=arm64
        export CROSS_COMPILE=aarch64-linux-android-
        export CROSS_COMPILE_ARM32=arm-linux-androideabi-
        export CLANG_TRIPLE=aarch64-linux-gnu-
        export CC=clang
        make ARCH=arm64 -j$(nproc)

    - name: Package with AnyKernel3
      run: |
        git clone https://github.com/osm0sis/AnyKernel3
        cp kernel/arch/arm64/boot/Image.gz AnyKernel3/
        cp kernel/arch/arm64/boot/dtbo.img AnyKernel3/ 2>/dev/null || true
        cd AnyKernel3
        cat > anykernel.sh << 'EOF'
#!/sbin/sh
kernel.string=GACOR Kernel for Redmi Note 11 (spes) - No OC
do.devicecheck=1
device.name1=spes
device.name2=spesn
block=boot
. /tmp/anykernel/tools/ak2-core.sh
dump_boot
write_boot
EOF
        zip -r9 ../GACOR_Kernel_spes.zip *
        cd ..

    - name: Upload kernel zip
      uses: actions/upload-artifact@v4
      with:
        name: GACOR-Kernel-spes-NoOC
        path: GACOR_Kernel_spes.zip