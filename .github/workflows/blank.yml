name: Build Kernel for Redmi Note 11 (spes/spesn)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
    - name: Install dependencies
      run: |
        sudo apt update
        sudo apt install -y git make gcc clang lld flex bison bc cpio python3 libssl-dev

    - name: Setup toolchain
      run: |
        git clone --depth=1 https://github.com/LineageOS/android_prebuilts_clang_host_linux-x86_clang-17 clang
        git clone --depth=1 https://github.com/LineageOS/android_prebuilts_gcc_linux-x86_aarch64_aarch64-linux-android-4.9 gcc64
        git clone --depth=1 https://github.com/LineageOS/android_prebuilts_gcc_linux-x86_arm_arm-linux-androideabi-4.9 gcc32

    - name: Clone kernel source
      run: |
        git clone --depth=1 https://github.com/Jabiyeff/kernel_xiaomi_sm6225 -b main kernel

    - name: Patch KernelSU-Next
      run: |
        cd kernel
        curl -LSs "https://raw.githubusercontent.com/KernelSU-Next/KernelSU-Next/next/kernel/setup.sh" | bash -

    - name: Set config and build
      run: |
        cd kernel
        export PATH=$GITHUB_WORKSPACE/clang/bin:$GITHUB_WORKSPACE/gcc64/bin:$GITHUB_WORKSPACE/gcc32/bin:$PATH
        export ARCH=arm64
        export SUBARCH=arm64
        export CROSS_COMPILE=aarch64-linux-android-
        export CROSS_COMPILE_ARM32=arm-linux-androideabi-
        export CLANG_TRIPLE=aarch64-linux-gnu-
        export CC=clang
        
        make ARCH=arm64 spes_defconfig
        make ARCH=arm64 -j$(nproc)

    - name: Create AnyKernel3 zip
      run: |
        git clone https://github.com/osm0sis/AnyKernel3
        cp kernel/arch/arm64/boot/Image.gz AnyKernel3/
        cp kernel/arch/arm64/boot/dtbo.img AnyKernel3/ 2>/dev/null || true
        cd AnyKernel3
        cat > anykernel.sh << 'EOF'
#!/sbin/sh
kernel.string=Kernel for Redmi Note 11 (spes/spesn)
do.devicecheck=1
device.name1=spes
device.name2=spesn
block=boot
. /tmp/anykernel/tools/ak2-core.sh
dump_boot
write_boot
EOF
        zip -r9 ../kernel_flashable.zip .
        cd ..

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: Kernel-spes-spesn
        path: kernel_flashable.zip