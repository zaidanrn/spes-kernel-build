name: Build spesn KernelSU-Next

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Install dependencies
      run: |
        sudo apt update
        sudo apt install -y \
          git curl wget python3 python2 zip unzip bc bison flex \
          libssl-dev cpio build-essential libelf-dev

    - name: Clone kernel source
      run: |
        git clone --depth=1 https://github.com/greenforce-project/kernel_xiaomi_spes_sm6225 -b main kernel

    - name: Setup KernelSU-Next
      run: |
        cd kernel
        curl -LSs "https://raw.githubusercontent.com/KernelSU-Next/KernelSU-Next/next/kernel/setup.sh" | bash -s next

    - name: Apply gaming tuning
      run: |
        cd kernel

        echo 'CONFIG_TCP_CONG_BBR=y' >> arch/arm64/configs/spes_defconfig
        echo 'CONFIG_DEFAULT_TCP_CONG="bbr"' >> arch/arm64/configs/spes_defconfig
        echo 'CONFIG_NET_SCH_FQ=y' >> arch/arm64/configs/spes_defconfig

        echo 'CONFIG_HZ_1000=y' >> arch/arm64/configs/spes_defconfig
        echo '# CONFIG_HZ_300 is not set' >> arch/arm64/configs/spes_defconfig

        echo 'CONFIG_CPU_FREQ_GOV_SCHEDUTIL=y' >> arch/arm64/configs/spes_defconfig

        echo '# CONFIG_DEBUG_KERNEL is not set' >> arch/arm64/configs/spes_defconfig
        echo '# CONFIG_PRINTK_TIME is not set' >> arch/arm64/configs/spes_defconfig

    - name: Setup clang
      run: |
        git clone --depth=1 https://github.com/kdrag0n/proton-clang clang

    - name: Build kernel
      run: |
        export ARCH=arm64
        export SUBARCH=arm64
        export KBUILD_BUILD_USER=GPT
        export KBUILD_BUILD_HOST=ChatGPT

        cd kernel

        mkdir -p out

        make O=out ARCH=arm64 spes_defconfig

        PATH=$GITHUB_WORKSPACE/clang/bin:$PATH \
        make -j$(nproc --all) \
        O=out \
        ARCH=arm64 \
        CC=clang \
        CROSS_COMPILE=aarch64-linux-gnu- \
        CROSS_COMPILE_ARM32=arm-linux-gnueabi-

    - name: Clone AnyKernel3
      run: |
        git clone --depth=1 https://github.com/osm0sis/AnyKernel3 AnyKernel3

    - name: Prepare ZIP
      run: |
        cp kernel/out/arch/arm64/boot/Image.gz-dtb AnyKernel3/

        cd AnyKernel3

        zip -r9 ../spesn-KernelSU-Next-Gaming.zip *

    - name: Upload ZIP
      uses: actions/upload-artifact@v4
      with:
        name: spesn-KernelSU-Next-Gaming
        path: spesn-KernelSU-Next-Gaming.zip               vendor/spes_defconfig
          make ARCH=arm64 CC=clang -j$(nproc)

      - name: Package with AnyKernel3
        run: |
          git clone https://github.com/osm0sis/AnyKernel3
          cp arch/arm64/boot/Image.gz-dtb AnyKernel3/
          cd AnyKernel3
          zip -r9 kernel-spes-KSU.zip . \
            -x '*.git*' -x 'README.md'

      - name: Upload artifact
        uses: actions/upload-artifact@v3
        with:
          name: kernel-spes-KSU
          path: AnyKernel3/kernel-spes-KSU.zip
