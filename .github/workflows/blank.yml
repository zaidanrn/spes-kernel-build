name: Build Kernel

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout kernel source
        uses: actions/checkout@v3

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            bc bison flex libssl-dev \
            libelf-dev git zip

      - name: Setup Clang toolchain
        run: |
          mkdir clang
          cd clang
          wget -q https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86/+archive/refs/heads/master/clang-r487747.tar.gz
          tar -xf clang-r487747.tar.gz

      - name: Integrate KernelSU
        run: |
          curl -LSs "https://raw.githubusercontent.com/tiann/KernelSU/main/kernel/setup.sh" | bash -

      - name: Build kernel
        run: |
          export PATH=$GITHUB_WORKSPACE/clang/bin:$PATH
          make ARCH=arm64 \
               CC=clang \
               vendor/spes_defconfig
          make ARCH=arm64 CC=clang -j$(nproc)

      - name: Package with AnyKernel3
        run: |
          git clone https://github.com/osm0sis/AnyKernel3
          cp arch/arm64/boot/Image.gz-dtb AnyKernel3/
          cd AnyKernel3
          zip -r9 kernel-spes-KSU.zip . \
            -x '*.git*' -x 'README.md'

      - name: Upload artifact
        uses: actions/upload-artifact@v3
        with:
          name: kernel-spes-KSU
          path: AnyKernel3/kernel-spes-KSU.zip